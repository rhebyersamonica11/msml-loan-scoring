name: Machine Learning CI Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pandas scikit-learn numpy
        # Jika kamu punya file requirements, sesuaikan path-nya
        # if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint code with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Automation Pipeline
      run: |
        # Mencari lokasi folder preprocessing dimanapun ia berada
        find . -type d -name "preprocessing"
        # Masuk ke folder tersebut dan jalankan script
        cd "$(find . -type d -name "preprocessing" | head -n 1)"
        python automate_Rheby_Ersa_Monica.py